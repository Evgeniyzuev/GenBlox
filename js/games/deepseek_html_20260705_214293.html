<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro Machines</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0e1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Rubik', sans-serif;
    }

    .game-root {
      position: relative;
      width: 960px;
      background: #1a1a2e;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .game-root.is-active .worms-canvas {
      display: block;
    }

    .worms-canvas {
      display: none;
      width: 100%;
      height: auto;
      border-radius: 12px;
      background: #1a1a2e;
      touch-action: none;
      cursor: pointer;
    }

    .worms-toolbar {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding: 8px 12px;
      background: rgba(21,20,37,0.6);
      border-radius: 14px;
      backdrop-filter: blur(4px);
      flex-wrap: wrap;
      justify-content: center;
    }

    .worms-toolbar button {
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      padding: 8px 16px;
      border-radius: 10px;
      font: 700 13px 'Rubik', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .worms-toolbar button:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }

    .worms-toolbar button.is-selected {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
      color: white;
      box-shadow: 0 0 20px rgba(255,255,255,0.05);
    }

    .worms-toolbar button b {
      font-size: 20px;
    }

    .worms-toolbar button span {
      font-size: 12px;
    }

    .worms-map-choice {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .worms-map-heading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 20px 0 8px;
    }

    .worms-map-heading small {
      display: block;
      color: rgba(255,255,255,0.3);
      font: 700 11px 'Rubik', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .worms-map-heading strong {
      display: block;
      color: white;
      font: 900 28px 'Rubik', sans-serif;
      margin-top: 4px;
    }

    .worms-map-button {
      position: relative;
      background: rgba(255,255,255,0.03);
      border: 2px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px 20px 20px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
      color: white;
      overflow: hidden;
      min-height: 160px;
    }

    .worms-map-button:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    .worms-map-button > span {
      display: block;
      width: 100%;
      height: 6px;
      margin-bottom: 16px;
      border-radius: 4px;
      background: linear-gradient(to right, var(--map-a), var(--map-b));
    }

    .worms-map-button strong {
      display: block;
      font: 800 20px 'Rubik', sans-serif;
      margin-bottom: 4px;
    }

    .worms-map-button small {
      display: block;
      color: rgba(255,255,255,0.4);
      font: 400 13px 'Rubik', sans-serif;
    }

    .worms-map-button i {
      display: inline-block;
      margin-top: 12px;
      font-style: normal;
      color: rgba(255,255,255,0.2);
      font-size: 12px;
      letter-spacing: 2px;
    }

    .worms-restart {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      color: white;
      padding: 14px 40px;
      border-radius: 14px;
      font: 700 16px 'Rubik', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .worms-restart:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }

    @media (max-width: 1000px) {
      .game-root {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
      }
      .worms-map-choice {
        grid-template-columns: 1fr;
      }
      .worms-map-button {
        min-height: 120px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="game-root" id="game"></div>
  <script type="module">
    import { MicroMachinesGame } from './microMachines.js';
    
    const game = new MicroMachinesGame(document.getElementById('game'), {
      onStatus: (msg) => console.log(msg)
    });
  </script>
</body>
</html>
